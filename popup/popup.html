<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WiseMail</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      min-height: 400px;
      background: #0a0f1e;
      color: #cbd5e1;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 18px 20px;
      background: #080d1a;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .version {
      font-size: 10px;
      font-family: monospace;
      color: #94a3b8;
    }

    .body { padding: 24px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #1e293b;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }
    .status-dot.inactive { background: #475569; box-shadow: none; }

    .status-text { font-size: 12px; color: #94a3b8; }

    .scan-btn {
      width: 100%;
      padding: 14px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .scan-btn:hover { background: #2563eb; color: white; border-color: #60a5fa; }
    .scan-btn:active { transform: scale(0.98); }

    .divider {
      height: 1px;
      background: #1e293b;
      margin: 14px 0;
    }

    .shortcuts {
      padding: 10px 12px;
      background: #080d1a;
      border-radius: 6px;
      border: 1px solid #1e293b;
    }

    .shortcut-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .shortcut-desc { font-size: 11px; color: #94a3b8; }

    kbd {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 3px;
      padding: 1px 5px;
      color: #cbd5e1;
    }

    .settings-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: #94a3b8;
      text-decoration: none;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .settings-link:hover { background: #0f172a; color: #3b82f6; }

    .supported {
      margin-top: 14px;
      font-size: 10px;
      color: #64748b;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 17px;
      font-weight: 600;
      color: #3b82f6;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><span class="wordmark">WiseMail</span></div>
    <span class="version">v1.0</span>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking configuration…</span>
    </div>

    <button class="scan-btn" id="scan-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Scan Current Email
    </button>

    <div class="divider"></div>

    <div class="shortcuts">
      <div class="shortcut-title">Keyboard Shortcut</div>
      <div class="shortcut-row">
        <span class="shortcut-desc">Scan email</span>
        <span><kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>C</kbd></span>
      </div>
    </div>

    <a href="../options/options.html" class="settings-link" id="settings-link">
      ⚙ Configure API Key &amp; Settings
    </a>

    <div class="supported">
      Supports Gmail · Outlook Web
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
